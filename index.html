    <style>
      :root {
        --bg-a: #f4f8ff;
        --bg-b: #fff8f1;
        --bg-c: #ecfff5;
        --ink: #0f172a;
      }

      .dark {
        --bg-a: #0f172a;
        --bg-b: #111827;
        --bg-c: #1f2937;
        --ink: #e5e7eb;
      }

      body {
        font-family: "Space Grotesk", "Segoe UI", "Helvetica Neue", sans-serif;
        color: var(--ink);
      }

      .panel-bg {
        background:
          radial-gradient(circle at 10% 12%, rgba(16, 185, 129, 0.15) 0, transparent 32%),
          radial-gradient(circle at 88% 16%, rgba(249, 115, 22, 0.14) 0, transparent 35%),
          linear-gradient(145deg, var(--bg-a), var(--bg-b) 48%, var(--bg-c));
      }

      .appear {
        animation: rise-in 480ms ease both;
      }

      .stagger-1 {
        animation-delay: 80ms;
      }

      .stagger-2 {
        animation-delay: 140ms;
      }

      .stagger-3 {
        animation-delay: 200ms;
      }

      @keyframes rise-in {
        from {
          opacity: 0;
          transform: translateY(14px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>

          Expired: "bg-slate-200 text-slate-700 dark:bg-slate-700 dark:text-slate-200"
        };

        return `<span class="inline-flex rounded-full px-2 py-1 text-xs font-semibold ${map[status] || map.Inactive}">${status}</span>`;
      }

      function severityBadge(severity, resolved) {
        if (resolved) {

        }

        const map = {
          Critical: "bg-fuchsia-100 text-fuchsia-800 dark:bg-fuchsia-900/40 dark:text-fuchsia-300",
          Warning: "bg-amber-100 text-amber-800 dark:bg-amber-900/40 dark:text-amber-300",
          Info: "bg-slate-200 text-slate-700 dark:bg-slate-700 dark:text-slate-200"
        };

        return `<span class="inline-flex rounded-full px-2 py-1 text-xs font-semibold ${map[severity] || map.Info}">${severity}</span>`;
      }

      function dropdownActions(entity, id, actions) {
        const actionHtml = actions
          .map(

                class="menu-item block w-full px-3 py-2 text-left text-sm text-slate-700 hover:bg-slate-100 dark:text-slate-200 dark:hover:bg-slate-700"

                data-entity="${entity}"
                data-id="${id}"
              >
                ${action.label}
              </button>
            `
          )
          .join("");

        return `
          <div class="relative inline-block text-left">
            <button
              class="menu-trigger grid h-8 w-8 place-items-center rounded-lg border border-slate-300 text-slate-600 transition hover:bg-slate-100 dark:border-slate-600 dark:text-slate-300 dark:hover:bg-slate-700"
              data-menu-id="menu-${entity}-${id}"
              aria-expanded="false"
              aria-label="Row actions"
            >
              ⋮
            </button>
            <div
              id="menu-${entity}-${id}"
              class="menu-panel absolute right-0 z-20 mt-2 hidden min-w-40 overflow-hidden rounded-xl border border-slate-200 bg-white shadow-xl dark:border-slate-700 dark:bg-slate-800"
            >
              ${actionHtml}
            </div>
          </div>
        `;
      }

      function renderWeeklyActivityChart() {
        const weeklyActivity = [
          { day: "Mon", value: 32 },
          { day: "Tue", value: 45 },
          { day: "Wed", value: 38 },
          { day: "Thu", value: 54 },
          { day: "Fri", value: 49 },
          { day: "Sat", value: 27 },
          { day: "Sun", value: 22 }
        ];

        const chartHeight = 220;
        const baselineY = 176;
        const barWidth = 42;
        const gap = 18;
        const startX = 20;
        const maxValue = Math.max(...weeklyActivity.map((entry) => entry.value), 1);

        const bars = weeklyActivity
          .map((entry, index) => {
            const barHeight = Math.round((entry.value / maxValue) * 120);
            const x = startX + index * (barWidth + gap);
            const y = baselineY - barHeight;

            return `
              <g>
                <rect
                  x="${x}"
                  y="${y}"
                  width="${barWidth}"
                  height="${barHeight}"
                  rx="10"
                  fill="url(#activityBarGradient)"
                ></rect>
                <text x="${x + barWidth / 2}" y="${y - 8}" text-anchor="middle" class="fill-slate-600 text-[10px] dark:fill-slate-300">${entry.value}</text>
                <text x="${x + barWidth / 2}" y="${baselineY + 18}" text-anchor="middle" class="fill-slate-500 text-[11px] dark:fill-slate-400">${entry.day}</text>
              </g>
            `;
          })
          .join("");

        return `
          <div class="mt-5 overflow-hidden rounded-2xl border border-slate-200 bg-white/80 p-4 shadow-sm dark:border-slate-700 dark:bg-slate-900/75">
            <div class="mb-3 flex items-center justify-between gap-3">
              <div>
                <p class="text-sm font-semibold text-slate-900 dark:text-slate-100">Weekly Activity Chart</p>
                <p class="text-xs text-slate-500 dark:text-slate-400">Agent tasks completed by day</p>
              </div>
              <span class="rounded-full bg-emerald-100 px-2.5 py-1 text-xs font-semibold text-emerald-800 dark:bg-emerald-900/40 dark:text-emerald-300">267 total tasks</span>
            </div>

            <svg viewBox="0 0 460 ${chartHeight}" class="h-56 w-full">
              <defs>
                <linearGradient id="activityBarGradient" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="#06b6d4"></stop>
                  <stop offset="100%" stop-color="#10b981"></stop>
                </linearGradient>
              </defs>

              <line x1="10" y1="176" x2="450" y2="176" class="stroke-slate-300 dark:stroke-slate-600" stroke-width="1"></line>
              ${bars}
            </svg>
          </div>
        `;
      }

                      return `
                        <tr>
                          <td class="px-4 py-3 font-medium text-slate-900 dark:text-slate-100">${agent.name}</td>
                          <td class="px-4 py-3 text-slate-600 dark:text-slate-300">${agent.owner}</td>
                          <td class="px-4 py-3">${statusBadge(agent.status)}</td>
                          <td class="px-4 py-3 text-slate-600 dark:text-slate-300">
                            <div>
                              <button
                                class="toggle-skills inline-flex items-center gap-2 rounded-lg border border-slate-300 px-2 py-1 text-xs font-medium transition hover:bg-slate-100 dark:border-slate-600 dark:hover:bg-slate-700"
                                data-agent-id="${agent.id}"
                                aria-expanded="${expanded ? "true" : "false"}"
                              >
                                <span>${skillsSummary(agent.skills)}</span>
                                <span class="transform transition ${expanded ? "rotate-180" : ""}">⌄</span>
                              </button>
                              <div class="overflow-hidden text-xs transition-all duration-300 ${
                                expanded ? "mt-2 max-h-40 opacity-100" : "max-h-0 opacity-0"
                              }">
                                <ul class="space-y-1">
                                  ${agent.skills
                                    .map(
                                      (skill) => `<li class="rounded bg-slate-100 px-2 py-1 dark:bg-slate-800">${skill}</li>`
                                    )
                                    .join("")}
                                </ul>
                              </div>
                            </div>
                          </td>
                          <td class="px-4 py-3 text-right">${dropdownActions("agent", agent.id, [
                            { key: "configure", label: "Configure" },
                            { key: "delete", label: "Delete" }
                          ])}</td>
                        </tr>
                      `;
                    })
                    .join("")}
                </tbody>
              </table>
            </div>
          </div>
        `;
      }

      function renderSkills() {
        const skillsSection = document.getElementById("section-skills");
        skillsSection.innerHTML = `
          <div class="mb-4 rounded-2xl border border-cyan-200 bg-cyan-50/80 p-4 text-sm text-cyan-900 dark:border-cyan-800 dark:bg-cyan-900/25 dark:text-cyan-200">
            <p class="font-semibold">What is a skill?</p>
            <p class="mt-1">A skill is a capability attached to an agent (such as web browsing, document reading, or calendar management) to extend what it can do for a business workflow.</p>
          </div>

          <div class="grid gap-4 md:grid-cols-2 xl:grid-cols-3">
            ${state.skills
              .map(
                (skill) => `
              <article class="rounded-2xl border border-slate-200 bg-white/85 p-4 shadow-sm transition hover:shadow-md dark:border-slate-700 dark:bg-slate-900/80">
                <div class="mb-3 flex items-start justify-between gap-3">
                  <div>
                    <h3 class="text-base font-semibold text-slate-900 dark:text-slate-100">${skill.name}</h3>
                    <p class="mt-1 text-sm text-slate-600 dark:text-slate-300">${skill.shortDescription}</p>
                  </div>
                  ${dropdownActions("skill", skill.id, [
                    { key: "view", label: "View detail" },
                    { key: "delete", label: "Delete" }
                  ])}
                </div>
                <span class="inline-flex rounded-full bg-violet-100 px-2 py-1 text-xs font-semibold text-violet-800 dark:bg-violet-900/40 dark:text-violet-300">${skill.attachedAgents.length} agents</span>
              </article>
            `
              )
              .join("")}
          </div>
        `;
      }

      function renderContracts() {
        const contractsSection = document.getElementById("section-contracts");
        contractsSection.innerHTML = `
          <div class="overflow-hidden rounded-2xl border border-slate-200 bg-white/85 shadow-sm dark:border-slate-700 dark:bg-slate-900/80">
            <div class="overflow-x-auto">
              <table class="min-w-full text-left text-sm">
                <thead class="bg-slate-50 text-slate-500 dark:bg-slate-800 dark:text-slate-300">
                  <tr>
                    <th class="px-4 py-3 font-medium">Client</th>
                    <th class="px-4 py-3 font-medium">Rented Agent</th>
                    <th class="px-4 py-3 font-medium">Contracted Skills</th>
                    <th class="px-4 py-3 font-medium">Contract Dates</th>
                    <th class="px-4 py-3 font-medium">Total Amount Paid</th>
                    <th class="px-4 py-3 font-medium">Status</th>
                    <th class="px-4 py-3 font-medium text-right">Actions</th>
                  </tr>
                </thead>
                <tbody class="divide-y divide-slate-200 dark:divide-slate-700">
                  ${state.contracts
                    .map(
                      (contract) => `
                      <tr class="${contract.status === "Expired" ? "text-slate-400 dark:text-slate-500" : ""}">
                        <td class="px-4 py-3 font-medium ${contract.status === "Expired" ? "" : "text-slate-900 dark:text-slate-100"}">${contract.client}</td>
                        <td class="px-4 py-3">${contract.agent}</td>
                        <td class="px-4 py-3">${contract.skills.join(", ")}</td>
                        <td class="px-4 py-3">${contract.startDate} - ${contract.endDate}</td>
                        <td class="px-4 py-3">${contract.totalPaid}</td>
                        <td class="px-4 py-3">${statusBadge(contract.status)}</td>
                        <td class="px-4 py-3 text-right">${dropdownActions("contract", contract.id, [
                          { key: "view", label: "View detail" }
                        ])}</td>
                      </tr>
                    `
                    )
                    .join("")}
                </tbody>
              </table>
            </div>
          </div>
        `;
      }

      function renderErrors() {
        const errorsSection = document.getElementById("section-errors");
        errorsSection.innerHTML = `
          <div class="overflow-hidden rounded-2xl border border-slate-200 bg-white/85 shadow-sm dark:border-slate-700 dark:bg-slate-900/80">
            <div class="overflow-x-auto">
              <table class="min-w-full text-left text-sm">
                <thead class="bg-slate-50 text-slate-500 dark:bg-slate-800 dark:text-slate-300">
                  <tr>
                    <th class="px-4 py-3 font-medium">Timestamp</th>
                    <th class="px-4 py-3 font-medium">Agent Name</th>
                    <th class="px-4 py-3 font-medium">Error Type</th>
                    <th class="px-4 py-3 font-medium">Description</th>
                    <th class="px-4 py-3 font-medium text-right">Actions</th>
                  </tr>
                </thead>
                <tbody class="divide-y divide-slate-200 dark:divide-slate-700">
                  ${state.errors
                    .map(
                      (item) => `
                    <tr class="${item.resolved ? "opacity-55" : ""}">
                      <td class="px-4 py-3 text-slate-600 dark:text-slate-300">${item.timestamp}</td>
                      <td class="px-4 py-3 font-medium text-slate-900 dark:text-slate-100">${item.agentName}</td>
                      <td class="px-4 py-3">${severityBadge(item.severity, item.resolved)}</td>
                      <td class="px-4 py-3 text-slate-600 dark:text-slate-300">${item.description}</td>
                      <td class="px-4 py-3 text-right">${dropdownActions("error", item.id, [
                        { key: "view", label: "View detail" },
                        { key: "resolve", label: "Mark as resolved" }
                      ])}</td>
                    </tr>
                  `
                    )
                    .join("")}
                </tbody>
              </table>
            </div>
          </div>
        `;
      }

      function renderSections() {
        renderDashboard();
        renderUsers();
        renderAgents();
        renderSkills();
        renderContracts();
        renderErrors();

        document.querySelectorAll(".view-section").forEach((section) => {
          section.classList.add("hidden");
        });

        const active = document.getElementById(`section-${state.activeSection}`);
        active.classList.remove("hidden");
      }

      function setSection(nextSection) {
        state.activeSection = nextSection;
        renderSidebar();
        renderSections();
      }

      function closeAnyOpenMenu() {
        if (!openMenuButton) return;
        const menuId = openMenuButton.getAttribute("data-menu-id");
        const menu = document.getElementById(menuId);
        if (menu) {
          menu.classList.add("hidden");
        }
        openMenuButton.setAttribute("aria-expanded", "false");
        openMenuButton = null;
      }

      function openModal(title, body) {
        lastFocusedElement = document.activeElement;
        modalTitle.textContent = title;
        modalBody.innerHTML = body;
        modalRoot.classList.remove("hidden");
        modalRoot.classList.add("flex");
        closeModalBtn.focus();
      }

      function closeModal() {
        modalRoot.classList.add("hidden");
        modalRoot.classList.remove("flex");
        if (lastFocusedElement && typeof lastFocusedElement.focus === "function") {
          lastFocusedElement.focus();
        }
      }

      function viewUser(id) {
        const user = state.users.find((item) => item.id === id);
        if (!user) return;
        openModal(
          `User Detail: ${user.name}`,
          `
            <div class="grid gap-2">
              <p><span class="font-semibold">Name:</span> ${user.name}</p>
              <p><span class="font-semibold">Email:</span> ${user.email}</p>
              <p><span class="font-semibold">Plan:</span> ${user.plan}</p>
              <p><span class="font-semibold">Status:</span> ${statusBadge(user.status)}</p>
              <p><span class="font-semibold">Signup Date:</span> ${user.signupDate}</p>
              <p><span class="font-semibold">Agents Rented:</span> ${user.agentsRented}</p>
            </div>
          `
        );
      }

      function configureAgent(id) {
        const agent = state.agents.find((item) => item.id === id);
        if (!agent) return;
        openModal(
          `Configure Agent: ${agent.name}`,
          `
            <div class="grid gap-3">
              <p><span class="font-semibold">Status:</span> ${statusBadge(agent.status)}</p>
              <p><span class="font-semibold">Owner:</span> ${agent.owner}</p>
              <div>
                <p class="mb-1 font-semibold">System Prompt</p>
                <pre class="overflow-auto rounded-xl bg-slate-100 p-3 text-xs leading-relaxed text-slate-800 dark:bg-slate-800 dark:text-slate-100">${agent.prompt}</pre>
              </div>
            </div>
          `
        );
      }

      function viewSkill(id) {
        const skill = state.skills.find((item) => item.id === id);
        if (!skill) return;
        openModal(
          `Skill Detail: ${skill.name}`,
          `
            <div class="grid gap-3">
              <p>${skill.fullDescription}</p>
              <div>
                <p class="mb-2 font-semibold">Agents Using This Skill</p>
                <ul class="space-y-1">
                  ${skill.attachedAgents
                    .map(
                      (agentName) =>
                        `<li class="rounded bg-slate-100 px-2 py-1 dark:bg-slate-800">${agentName}</li>`
                    )
                    .join("")}
                </ul>
              </div>
            </div>
          `
        );
      }

      function viewContract(id) {
        const contract = state.contracts.find((item) => item.id === id);
        if (!contract) return;
        openModal(
          `Contract Detail: ${contract.client}`,
          `
            <div class="grid gap-3">
              <p><span class="font-semibold">Client:</span> ${contract.client}</p>
              <p><span class="font-semibold">Agent:</span> ${contract.agent}</p>
              <p><span class="font-semibold">Contract Dates:</span> ${contract.startDate} - ${contract.endDate}</p>
              <div>
                <p class="mb-2 font-semibold">Itemized Skills</p>
                <ul class="space-y-1">
                  ${contract.skillPricing
                    .map(
                      (line) =>
                        `<li class="flex items-center justify-between rounded bg-slate-100 px-2 py-1 dark:bg-slate-800"><span>${line.skill}</span><span>${line.price}</span></li>`
                    )
                    .join("")}
                </ul>
              </div>
              <p class="text-base font-semibold text-slate-900 dark:text-slate-100">Total: ${contract.totalPaid}</p>
            </div>
          `
        );
      }

      function viewError(id) {
        const item = state.errors.find((error) => error.id === id);
        if (!item) return;
        openModal(
          `Error Detail: ${item.agentName}`,
          `
            <div class="grid gap-3">
              <p><span class="font-semibold">Timestamp:</span> ${item.timestamp}</p>
              <p><span class="font-semibold">Agent:</span> ${item.agentName}</p>
              <p><span class="font-semibold">Error Type:</span> ${item.errorType}</p>
              <p><span class="font-semibold">Severity:</span> ${severityBadge(item.severity, item.resolved)}</p>
              <div>
                <p class="mb-1 font-semibold">Trace</p>
                <pre class="overflow-auto rounded-xl bg-slate-100 p-3 text-xs leading-relaxed text-slate-800 dark:bg-slate-800 dark:text-slate-100">${item.trace}</pre>
              </div>
            </div>
          `
        );
      }

      function deleteUser(id) {
        state.users = state.users.filter((item) => item.id !== id);
        renderSections();
      }

      function deleteAgent(id) {
        state.agents = state.agents.filter((item) => item.id !== id);
        state.expandedAgentSkills.delete(id);
        renderSections();
      }

      function deleteSkill(id) {
        state.skills = state.skills.filter((item) => item.id !== id);
        renderSections();
      }

      function resolveError(id) {
        state.errors = state.errors.map((item) =>
          item.id === id ? { ...item, resolved: true } : item
        );
        renderSections();
      }

      function handleAction(action, entity, id) {
        const numId = Number(id);

        if (entity === "user" && action === "view") return viewUser(numId);
        if (entity === "user" && action === "delete") return deleteUser(numId);

        if (entity === "agent" && action === "configure") return configureAgent(numId);
        if (entity === "agent" && action === "delete") return deleteAgent(numId);

        if (entity === "skill" && action === "view") return viewSkill(numId);
        if (entity === "skill" && action === "delete") return deleteSkill(numId);

        if (entity === "contract" && action === "view") return viewContract(numId);

        if (entity === "error" && action === "view") return viewError(numId);
        if (entity === "error" && action === "resolve") return resolveError(numId);
      }

      function applyTheme(darkEnabled) {
        document.documentElement.classList.toggle("dark", darkEnabled);
        themeIcon.textContent = darkEnabled ? "🌙" : "☀️";
        themeLabel.textContent = darkEnabled ? "Dark" : "Light";
      }

      function bootstrapEvents() {
        document.addEventListener("click", (event) => {
          const sectionBtn = event.target.closest("[data-section]");
          if (sectionBtn) {
            setSection(sectionBtn.getAttribute("data-section"));
            return;
          }

          const toggleBtn = event.target.closest(".toggle-skills");
          if (toggleBtn) {
            const agentId = Number(toggleBtn.getAttribute("data-agent-id"));
            if (state.expandedAgentSkills.has(agentId)) {
              state.expandedAgentSkills.delete(agentId);
            } else {
              state.expandedAgentSkills.add(agentId);
            }
            renderSections();
            return;
          }

          const menuTrigger = event.target.closest(".menu-trigger");
          if (menuTrigger) {
            const menuId = menuTrigger.getAttribute("data-menu-id");
            const menu = document.getElementById(menuId);
            const alreadyOpen = openMenuButton === menuTrigger;
            closeAnyOpenMenu();

            if (!alreadyOpen) {
              menu.classList.remove("hidden");
              menuTrigger.setAttribute("aria-expanded", "true");
              openMenuButton = menuTrigger;
            }
            return;
          }

          const menuItem = event.target.closest(".menu-item");
          if (menuItem) {
            const action = menuItem.getAttribute("data-action");
            const entity = menuItem.getAttribute("data-entity");
            const id = menuItem.getAttribute("data-id");
            closeAnyOpenMenu();
            handleAction(action, entity, id);
            return;
          }

          if (!event.target.closest(".menu-panel")) {
            closeAnyOpenMenu();
          }
        });

        themeToggle.addEventListener("click", () => {
          const currentlyDark = document.documentElement.classList.contains("dark");
          applyTheme(!currentlyDark);
        });

        closeModalBtn.addEventListener("click", closeModal);
        modalBackdrop.addEventListener("click", closeModal);

        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape") {
            closeAnyOpenMenu();
            if (!modalRoot.classList.contains("hidden")) {
              closeModal();
            }
          }
        });
      }

      renderSidebar();
      renderSections();
      applyTheme(false);
      bootstrapEvents();
    </script>
  </body>
</html>
